name: Bug report
description: Report a reproducible Verbally problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private transcripts, audio, or screenshots with private text.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: Pixel 8, Android 15
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Verbally version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Accessibility / floating bubble
        - Recording
        - Provider setup
        - Text insertion
        - History / dictionary / snippets
        - Store / install
        - Other
    validations:
      required: true
